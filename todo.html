<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>✓ My Tasks</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <span class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </span>
                <span class="stat-item">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value active-count" id="activeCount">0</span>
                </span>
                <span class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value completed-count" id="completedCount">0</span>
                </span>
            </div>

            <div class="tasks-container" id="tasksContainer">
                <!-- Tasks will be dynamically added here -->
            </div>

            <div class="empty-state" id="emptyState">
                <p class="empty-icon">📝</p>
                <p class="empty-text">No tasks yet. Add one to get started!</p>
            </div>

            <div class="actions">
                <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
                <button id="clearAllBtn" class="clear-all-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
